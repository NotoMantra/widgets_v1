<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Widget</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f3ff 0%, #faf5ff 100%);
            padding: 16px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .widget-container {
            width: 300px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 6px 24px rgba(147, 51, 234, 0.1);
            overflow: hidden;
            border: 1px solid #f3e8ff;
        }

        .header {
            background: linear-gradient(135deg, #9333ea 0%, #a855f7 50%, #c084fc 100%);
            padding: 12px 16px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .focus-ring {
            position: relative;
            width: 36px;
            height: 36px;
        }

        .focus-ring svg {
            transform: rotate(-90deg);
        }

        .focus-ring circle {
            fill: none;
            stroke-width: 3;
        }

        .focus-ring .bg {
            stroke: rgba(255, 255, 255, 0.2);
        }

        .focus-ring .progress {
            stroke: white;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.6s ease;
        }

        .focus-percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: 700;
            color: white;
        }

        .subtitle {
            font-size: 11px;
            opacity: 0.95;
            margin-bottom: 6px;
        }

        .focus-stats {
            display: flex;
            gap: 6px;
        }

        .focus-stat {
            flex: 1;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 4px 6px;
            border-radius: 5px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .focus-stat-value {
            font-size: 13px;
            font-weight: 700;
            display: block;
        }

        .focus-stat-label {
            font-size: 8px;
            opacity: 0.85;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .daily-cookie {
            background: linear-gradient(135deg, #faf5ff 0%, #f3e8ff 100%);
            padding: 10px 14px;
            border-bottom: 1px solid #f3e8ff;
            position: relative;
        }

        .daily-cookie::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, #9333ea 0%, #a855f7 100%);
        }

        .cookie-text {
            font-size: 10px;
            color: #6b21a8;
            font-weight: 500;
            line-height: 1.4;
            font-style: italic;
        }

        .widget-item {
            border-bottom: 1px solid #f3e8ff;
            padding: 12px 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .widget-item:last-child {
            border-bottom: none;
        }

        .widget-item:hover {
            background: linear-gradient(135deg, #faf5ff 0%, #ffffff 100%);
            transform: translateX(2px);
        }

        .widget-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            transition: width 0.3s;
        }

        .widget-item:hover::before {
            width: 3px;
        }

        .widget-item:nth-child(2)::before { background: linear-gradient(180deg, #9333ea 0%, #a855f7 100%); }
        .widget-item:nth-child(3)::before { background: linear-gradient(180deg, #a855f7 0%, #c084fc 100%); }

        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .widget-title-group {
            flex: 1;
        }

        .widget-label {
            font-size: 12px;
            font-weight: 700;
            color: #37352f;
            margin-bottom: 2px;
        }

        .widget-meta {
            font-size: 9px;
            color: #9333ea;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .edit-button {
            background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%);
            border: none;
            color: #7c3aed;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 5px rgba(147, 51, 234, 0.08);
        }

        .edit-button:hover {
            background: linear-gradient(135deg, #e9d5ff 0%, #d8b4fe 100%);
            color: #6b21a8;
            transform: translateY(-1px);
            box-shadow: 0 3px 7px rgba(147, 51, 234, 0.15);
        }

        .content-display {
            background: linear-gradient(135deg, #faf5ff 0%, #f9f5ff 100%);
            border: 1.5px solid #e9d5ff;
            border-radius: 7px;
            padding: 8px 10px;
            font-size: 11px;
            color: #37352f;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 38px;
            transition: all 0.3s;
        }

        .content-display.has-content {
            background: linear-gradient(135deg, #ffffff 0%, #faf5ff 100%);
            border: 1.5px solid #c084fc;
            box-shadow: 0 2px 8px rgba(147, 51, 234, 0.06);
        }

        .content-display.empty {
            color: #a78bfa;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-style: dashed;
            font-size: 10px;
        }

        .char-counter {
            margin-top: 5px;
            font-size: 9px;
            color: #a78bfa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .char-progress {
            flex: 1;
            height: 2px;
            background: #f3e8ff;
            border-radius: 10px;
            overflow: hidden;
            margin-right: 5px;
        }

        .char-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #9333ea 0%, #c084fc 100%);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .due-date-display {
            margin-top: 6px;
            padding: 5px 8px;
            background: white;
            border: 1.5px solid #e9d5ff;
            border-radius: 5px;
            font-size: 10px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 5px rgba(147, 51, 234, 0.04);
        }

        .due-date-label {
            color: #9333ea;
            font-weight: 700;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .due-date-value {
            color: #37352f;
            font-weight: 600;
        }

        .due-date-value.overdue {
            color: #dc2626;
            font-weight: 700;
        }

        .due-date-value.today {
            color: #ea580c;
            font-weight: 700;
        }

        .due-date-value.upcoming {
            color: #16a34a;
            font-weight: 600;
        }

        .edit-area {
            display: none;
        }

        .edit-area.active {
            display: block;
        }

        textarea {
            width: 100%;
            min-height: 55px;
            padding: 8px 10px;
            border: 1.5px solid #e9d5ff;
            border-radius: 7px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            line-height: 1.5;
            color: #37352f;
            resize: vertical;
            outline: none;
            transition: all 0.3s;
            background: white;
        }

        textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
        }

        textarea::placeholder {
            color: #c084fc;
            font-size: 10px;
        }

        .date-input-group {
            margin-top: 6px;
        }

        .date-label {
            font-size: 9px;
            color: #6b21a8;
            font-weight: 700;
            margin-bottom: 3px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        input[type="date"] {
            width: 100%;
            padding: 6px 8px;
            border: 1.5px solid #e9d5ff;
            border-radius: 5px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            color: #37352f;
            outline: none;
            transition: all 0.3s;
            background: white;
            font-weight: 500;
        }

        input[type="date"]:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
        }

        .action-buttons {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .btn {
            flex: 1;
            padding: 6px 12px;
            border: 1.5px solid #e9d5ff;
            border-radius: 5px;
            background: white;
            color: #6b21a8;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            background: #faf5ff;
            border-color: #d8b4fe;
            transform: translateY(-1px);
        }

        .btn.primary {
            background: linear-gradient(135deg, #9333ea 0%, #a855f7 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 2px 8px rgba(147, 51, 234, 0.2);
        }

        .btn.primary:hover {
            background: linear-gradient(135deg, #7e22ce 0%, #9333ea 100%);
            transform: translateY(-1px);
            box-shadow: 0 3px 12px rgba(147, 51, 234, 0.3);
        }

        .timestamp {
            font-size: 9px;
            color: #a78bfa;
            margin-top: 5px;
            font-weight: 500;
        }

        .completion-badge {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #9333ea 0%, #a855f7 100%);
            color: white;
            padding: 20px 32px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 800;
            box-shadow: 0 20px 60px rgba(147, 51, 234, 0.4);
            z-index: 1000;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .completion-badge.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        @media (max-width: 480px) {
            .widget-container {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <!-- Header with Progress Ring -->
        <div class="header">
            <div class="header-content">
                <div class="title-row">
                    <div class="title">Focus</div>
                    <div class="focus-ring">
                        <svg width="36" height="36">
                            <circle class="bg" cx="18" cy="18" r="15"></circle>
                            <circle class="progress" id="mainProgress" cx="18" cy="18" r="15" 
                                    stroke-dasharray="94.2" stroke-dashoffset="94.2"></circle>
                        </svg>
                        <div class="focus-percentage" id="focusPercentage">0%</div>
                    </div>
                </div>
                <div class="subtitle">Your clarity compass</div>
                <div class="focus-stats">
                    <div class="focus-stat">
                        <span class="focus-stat-value" id="completedCount">0</span>
                        <span class="focus-stat-label">Done</span>
                    </div>
                    <div class="focus-stat">
                        <span class="focus-stat-value" id="totalWords">0</span>
                        <span class="focus-stat-label">Words</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Daily Cookie -->
        <div class="daily-cookie">
            <div class="cookie-text" id="cookieText">Loading your daily inspiration...</div>
        </div>

        <!-- Widget 1 - Resolution -->
        <div class="widget-item">
            <div class="widget-header">
                <div class="widget-title-group">
                    <div class="widget-label">Top 1 Resolution</div>
                    <div class="widget-meta">Identity & Intent</div>
                </div>
                <button class="edit-button" onclick="toggleEdit(1)">Edit</button>
            </div>
            <div class="content-display empty" id="display1">
                Click Edit to add your resolution...
            </div>
            <div class="char-counter" id="counter1" style="display: none;">
                <div class="char-progress">
                    <div class="char-progress-fill" id="progress1" style="width: 0%"></div>
                </div>
                <span id="charCount1">0/500</span>
            </div>
            <div class="edit-area" id="edit1">
                <textarea 
                    id="resolution" 
                    placeholder="What defines who you want to become?"
                    maxlength="500"
                    oninput="updateCharCount(1, 'resolution')"
                ></textarea>
                <div class="action-buttons">
                    <button class="btn" onclick="cancelEdit(1)">Cancel</button>
                    <button class="btn primary" onclick="saveContent(1, 'resolution')">Save</button>
                </div>
            </div>
            <div class="timestamp" id="time1" style="display: none;"></div>
        </div>

        <!-- Widget 2 - Task with Due Date -->
        <div class="widget-item">
            <div class="widget-header">
                <div class="widget-title-group">
                    <div class="widget-label">Top 1 Next Task</div>
                    <div class="widget-meta">Daily Execution</div>
                </div>
                <button class="edit-button" onclick="toggleEdit(2)">Edit</button>
            </div>
            <div class="content-display empty" id="display2">
                Click Edit to add your task...
            </div>
            <div class="char-counter" id="counter2" style="display: none;">
                <div class="char-progress">
                    <div class="char-progress-fill" id="progress2" style="width: 0%"></div>
                </div>
                <span id="charCount2">0/500</span>
            </div>
            <div id="dueDateDisplay2" style="display: none;">
                <div class="due-date-display">
                    <span class="due-date-label">Due</span>
                    <span class="due-date-value" id="dueDateValue2"></span>
                </div>
            </div>
            <div class="edit-area" id="edit2">
                <textarea 
                    id="nextTask" 
                    placeholder="What's the one thing you must do today?"
                    maxlength="500"
                    oninput="updateCharCount(2, 'nextTask')"
                ></textarea>
                <div class="date-input-group">
                    <label class="date-label">Due Date</label>
                    <input type="date" id="taskDueDate">
                </div>
                <div class="action-buttons">
                    <button class="btn" onclick="cancelEdit(2)">Cancel</button>
                    <button class="btn primary" onclick="saveTask()">Save</button>
                </div>
            </div>
            <div class="timestamp" id="time2" style="display: none;"></div>
        </div>
    </div>

    <!-- Completion Badge -->
    <div class="completion-badge" id="completionBadge">
        Both Complete! 🎯
    </div>

    <script>
        const STORAGE_KEY = 'notionFocusWidget_v5';
        const fields = ['resolution', 'nextTask'];
        let data = {};

        const dailyCookies = [
            'Small steps every day lead to big changes over time.',
            'Focus on progress, not perfection.',
            'Your future self will thank you for what you do today.',
            'Clarity comes from action, not thought.',
            'You are capable of more than you think.',
            'Start before you\'re ready. Adjust as you go.',
            'Be gentle with yourself while staying committed.',
            'Every expert was once a beginner.',
            'Your only limit is the one you set yourself.',
            'Make today count. It\'s the only one you have.',
            'Consistency beats intensity every single time.',
            'Growth happens outside your comfort zone.',
            'Rest is productive. Recovery is progress.',
            'Each sunrise brings a new opportunity.',
            'Create the life you can\'t wait to wake up to.'
        ];

        document.addEventListener('DOMContentLoaded', function() {
            loadAllData();
            setDailyCookie();
            updateGlobalStats();
        });

        function setDailyCookie() {
            const dayIndex = new Date().getDate() % dailyCookies.length;
            document.getElementById('cookieText').textContent = dailyCookies[dayIndex];
        }

        function loadAllData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    data = JSON.parse(saved);
                    fields.forEach((field, index) => {
                        const widgetNum = index + 1;
                        if (data[field] && data[field].content) {
                            displayContent(widgetNum, data[field].content);
                            updateCharDisplay(widgetNum, data[field].content);
                            
                            if (field === 'nextTask' && data[field].dueDate) {
                                displayDueDate(data[field].dueDate);
                            }
                            
                            if (data[field].timestamp) {
                                updateTimestamp(widgetNum, data[field].timestamp);
                            }
                        }
                    });
                } catch (e) {
                    console.error('Error loading data');
                }
            }
        }

        function updateGlobalStats() {
            let completed = 0;
            let totalWords = 0;
            
            fields.forEach(field => {
                if (data[field] && data[field].content && data[field].content.trim()) {
                    completed++;
                    totalWords += data[field].content.trim().split(/\s+/).length;
                }
            });
            
            const percentage = Math.round((completed / 2) * 100);
            const circumference = 94.2;
            const offset = circumference - (percentage / 100) * circumference;
            
            document.getElementById('mainProgress').style.strokeDashoffset = offset;
            document.getElementById('focusPercentage').textContent = percentage + '%';
            document.getElementById('completedCount').textContent = completed + '/2';
            document.getElementById('totalWords').textContent = totalWords;
            
            if (completed === 2) {
                showCompletionBadge();
            }
        }

        function showCompletionBadge() {
            const badge = document.getElementById('completionBadge');
            badge.classList.add('show');
            setTimeout(() => {
                badge.classList.remove('show');
            }, 2500);
        }

        function updateCharCount(widgetNum, field) {
            const textarea = document.getElementById(field);
            const count = textarea.value.length;
            const percentage = (count / 500) * 100;
            
            document.getElementById(`charCount${widgetNum}`).textContent = `${count}/500`;
            document.getElementById(`progress${widgetNum}`).style.width = percentage + '%';
        }

        function updateCharDisplay(widgetNum, content) {
            const count = content.length;
            const percentage = (count / 500) * 100;
            
            document.getElementById(`counter${widgetNum}`).style.display = 'flex';
            document.getElementById(`charCount${widgetNum}`).textContent = `${count}/500`;
            document.getElementById(`progress${widgetNum}`).style.width = percentage + '%';
        }

        function toggleEdit(widgetNum) {
            const display = document.getElementById(`display${widgetNum}`);
            const edit = document.getElementById(`edit${widgetNum}`);
            const counter = document.getElementById(`counter${widgetNum}`);
            const field = fields[widgetNum - 1];
            const textarea = document.getElementById(field);
            
            if (data[field] && data[field].content) {
                textarea.value = data[field].content;
                updateCharCount(widgetNum, field);
                
                if (field === 'nextTask' && data[field].dueDate) {
                    document.getElementById('taskDueDate').value = data[field].dueDate;
                }
            }
            
            display.style.display = 'none';
            counter.style.display = 'none';
            if (widgetNum === 2) {
                document.getElementById('dueDateDisplay2').style.display = 'none';
            }
            edit.classList.add('active');
            textarea.focus();
        }

        function cancelEdit(widgetNum) {
            const display = document.getElementById(`display${widgetNum}`);
            const edit = document.getElementById(`edit${widgetNum}`);
            const counter = document.getElementById(`counter${widgetNum}`);
            
            display.style.display = 'flex';
            if (data[fields[widgetNum - 1]] && data[fields[widgetNum - 1]].content) {
                counter.style.display = 'flex';
            }
            if (widgetNum === 2 && data['nextTask'] && data['nextTask'].dueDate) {
                document.getElementById('dueDateDisplay2').style.display = 'block';
            }
            edit.classList.remove('active');
        }

        function saveTask() {
            const textarea = document.getElementById('nextTask');
            const content = textarea.value.trim();
            const dueDate = document.getElementById('taskDueDate').value;
            const timestamp = new Date().toISOString();
            
            data['nextTask'] = {
                content: content,
                dueDate: dueDate,
                timestamp: timestamp
            };
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            
            displayContent(2, content);
            updateCharDisplay(2, content);
            if (dueDate) {
                displayDueDate(dueDate);
            }
            updateTimestamp(2, timestamp);
            cancelEdit(2);
            updateGlobalStats();
        }

        function saveContent(widgetNum, field) {
            const textarea = document.getElementById(field);
            const content = textarea.value.trim();
            const timestamp = new Date().toISOString();
            
            data[field] = {
                content: content,
                timestamp: timestamp
            };
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            
            displayContent(widgetNum, content);
            updateCharDisplay(widgetNum, content);
            updateTimestamp(widgetNum, timestamp);
            cancelEdit(widgetNum);
            updateGlobalStats();
        }

        function displayContent(widgetNum, content) {
            const display = document.getElementById(`display${widgetNum}`);
            
            if (content && content.trim()) {
                display.textContent = content;
                display.classList.remove('empty');
                display.classList.add('has-content');
                display.style.display = 'block';
            } else {
                const placeholders = [
                    'Click Edit to add your resolution...',
                    'Click Edit to add your task...'
                ];
                display.textContent = placeholders[widgetNum - 1];
                display.classList.add('empty');
                display.classList.remove('has-content');
                display.style.display = 'flex';
            }
        }

        function displayDueDate(dueDate) {
            const dueDateDisplay = document.getElementById('dueDateDisplay2');
            const dueDateValue = document.getElementById('dueDateValue2');
            
            if (dueDate) {
                const due = new Date(dueDate);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                due.setHours(0, 0, 0, 0);
                
                const diffTime = due - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                const formatted = due.toLocaleDateString('en-US', { 
                    month: 'short', 
                    day: 'numeric', 
                    year: 'numeric' 
                });
                
                if (diffDays < 0) {
                    dueDateValue.textContent = `${formatted} (Overdue)`;
                    dueDateValue.className = 'due-date-value overdue';
                } else if (diffDays === 0) {
                    dueDateValue.textContent = `${formatted} (Today)`;
                    dueDateValue.className = 'due-date-value today';
                } else if (diffDays === 1) {
                    dueDateValue.textContent = `${formatted} (Tomorrow)`;
                    dueDateValue.className = 'due-date-value upcoming';
                } else if (diffDays <= 7) {
                    dueDateValue.textContent = `${formatted} (${diffDays} days)`;
                    dueDateValue.className = 'due-date-value upcoming';
                } else {
                    dueDateValue.textContent = formatted;
                    dueDateValue.className = 'due-date-value';
                }
                
                dueDateDisplay.style.display = 'block';
            } else {
                dueDateDisplay.style.display = 'none';
            }
        }

        function updateTimestamp(widgetNum, timestamp) {
            const timeEl = document.getElementById(`time${widgetNum}`);
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) {
                timeEl.textContent = 'Just now';
            } else if (diff < 3600000) {
                timeEl.textContent = `${Math.floor(diff / 60000)} min ago`;
            } else if (diff < 86400000) {
                timeEl.textContent = `${Math.floor(diff / 3600000)} hours ago`;
            } else if (diff < 172800000) {
                timeEl.textContent = 'Yesterday';
            } else {
                timeEl.textContent = date.toLocaleDateString();
            }
            
            timeEl.style.display = 'block';
        }

        setInterval(() => {
            fields.forEach((field, index) => {
                if (data[field] && data[field].timestamp) {
                    updateTimestamp(index + 1, data[field].timestamp);
                }
            });
        }, 60000);
    </script>
</body>
</html>
