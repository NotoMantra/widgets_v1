<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Launch Countdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            color: #000000;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* Setup Form */
        .setup-section {
            background: #ffffff;
            border: 2px solid #000000;
            padding: 30px;
            border-radius: 8px;
        }

        .setup-section h2 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .product-entry {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #e0e0e0;
        }

        .product-entry:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .product-number {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #000000;
            background: #ffffff;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }

        .start-btn {
            width: 100%;
            padding: 14px;
            background: #000000;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .start-btn:hover {
            background: #333333;
        }

        /* Countdown Display */
        .countdown-section {
            display: none;
            text-align: center;
            background: #000000;
            color: #ffffff;
            padding: 50px 30px;
            border-radius: 8px;
            min-height: 300px;
            position: relative;
        }

        .countdown-section.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .product-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .launch-date {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .countdown-display {
            margin-top: 10px;
        }

        .days-number {
            font-size: 96px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -3px;
        }

        .days-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.8;
        }

        .launched-message {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .progress-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .dot.active {
            background: #ffffff;
            width: 24px;
            border-radius: 4px;
        }

        .edit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .edit-btn:hover {
            background: #ffffff;
            color: #000000;
        }

        @media (max-width: 500px) {
            .days-number {
                font-size: 72px;
            }
            .product-name {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Setup Form -->
        <div class="setup-section" id="setupSection">
            <h2>Product Launch Countdown</h2>
            <div id="productEntries"></div>
            <button class="start-btn" onclick="startCountdown()">Start Countdown</button>
        </div>

        <!-- Countdown Display -->
        <div class="countdown-section" id="countdownSection">
            <button class="edit-btn" onclick="editProducts()">Edit</button>
            <div class="product-name" id="displayProductName"></div>
            <div class="launch-date" id="displayLaunchDate"></div>
            <div class="countdown-display" id="countdownDisplay"></div>
            <div class="progress-dots" id="progressDots"></div>
        </div>
    </div>

    <script>
        let products = [];
        let currentIndex = 0;
        let rotationInterval;
        let countdownInterval;

        // Initialize form with 5 product entry fields
        function initializeForm() {
            const container = document.getElementById('productEntries');
            for (let i = 1; i <= 5; i++) {
                const entry = document.createElement('div');
                entry.className = 'product-entry';
                entry.innerHTML = `
                    <div class="product-number">Product ${i}</div>
                    <div class="input-group">
                        <label for="name${i}">Product Name</label>
                        <input type="text" id="name${i}" placeholder="Enter product name">
                    </div>
                    <div class="input-group">
                        <label for="date${i}">Launch Date</label>
                        <input type="date" id="date${i}">
                    </div>
                `;
                container.appendChild(entry);
            }
            
            // Load saved data
            loadSavedData();
        }

        // Save data to localStorage
        function saveData() {
            const data = [];
            for (let i = 1; i <= 5; i++) {
                const name = document.getElementById(`name${i}`).value.trim();
                const date = document.getElementById(`date${i}`).value;
                data.push({ name, date });
            }
            localStorage.setItem('productLaunchData', JSON.stringify(data));
        }

        // Load data from localStorage
        function loadSavedData() {
            const savedData = localStorage.getItem('productLaunchData');
            if (savedData) {
                const data = JSON.parse(savedData);
                data.forEach((item, index) => {
                    const i = index + 1;
                    if (item.name) document.getElementById(`name${i}`).value = item.name;
                    if (item.date) document.getElementById(`date${i}`).value = item.date;
                });
                
                // Auto-start if data exists
                const hasValidProducts = data.some(item => item.name && item.date);
                if (hasValidProducts) {
                    setTimeout(() => startCountdown(), 100);
                }
            }
        }

        // Calculate days until launch
        function calculateDays(launchDate) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const launch = new Date(launchDate);
            launch.setHours(0, 0, 0, 0);
            const diffTime = launch - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }

        // Format date for display
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        // Update countdown display
        function updateDisplay() {
            if (products.length === 0) return;

            const product = products[currentIndex];
            const daysUntil = calculateDays(product.date);

            document.getElementById('displayProductName').textContent = product.name;
            document.getElementById('displayLaunchDate').textContent = formatDate(product.date);

            const displayDiv = document.getElementById('countdownDisplay');
            
            if (daysUntil < 0) {
                displayDiv.innerHTML = '<div class="launched-message">LAUNCHED! 🚀</div>';
            } else if (daysUntil === 0) {
                displayDiv.innerHTML = '<div class="launched-message">LAUNCHING TODAY! 🎉</div>';
            } else {
                displayDiv.innerHTML = `
                    <div class="days-number">${daysUntil}</div>
                    <div class="days-label">${daysUntil === 1 ? 'Day' : 'Days'} to Launch</div>
                `;
            }

            updateProgressDots();
        }

        // Update progress dots
        function updateProgressDots() {
            const dotsContainer = document.getElementById('progressDots');
            dotsContainer.innerHTML = '';
            
            if (products.length > 1) {
                products.forEach((_, index) => {
                    const dot = document.createElement('div');
                    dot.className = 'dot' + (index === currentIndex ? ' active' : '');
                    dotsContainer.appendChild(dot);
                });
            }
        }

        // Rotate to next product
        function rotateProduct() {
            if (products.length > 1) {
                currentIndex = (currentIndex + 1) % products.length;
                updateDisplay();
            }
        }

        // Start countdown
        function startCountdown() {
            // Save current data
            saveData();
            
            // Collect products
            products = [];
            for (let i = 1; i <= 5; i++) {
                const name = document.getElementById(`name${i}`).value.trim();
                const date = document.getElementById(`date${i}`).value;
                
                if (name && date) {
                    products.push({ name, date });
                }
            }

            if (products.length === 0) {
                alert('Please enter at least one product with a name and date.');
                return;
            }

            // Switch to countdown view
            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('countdownSection').classList.add('active');

            // Start display
            currentIndex = 0;
            updateDisplay();

            // Update countdown every minute
            countdownInterval = setInterval(updateDisplay, 60000);

            // Rotate products every 4 seconds if multiple
            if (products.length > 1) {
                rotationInterval = setInterval(rotateProduct, 4000);
            }
        }

        // Edit products
        function editProducts() {
            clearInterval(rotationInterval);
            clearInterval(countdownInterval);
            
            document.getElementById('countdownSection').classList.remove('active');
            document.getElementById('setupSection').style.display = 'block';
            
            // Data remains in form fields and will be saved when user clicks Start again
        }

        // Initialize on load
        initializeForm();
    </script>
</body>
</html>
